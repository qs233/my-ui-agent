<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Overview Fixture</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }
      .fixed-bar {
        position: fixed;
        z-index: 10;
        inset: 0 0 auto 0;
        height: 48px;
        background: #222;
        color: white;
      }
      .page {
        padding: 72px 24px 24px;
      }
      .panel {
        border: 1px solid #ccc;
        padding: 16px;
        width: 420px;
      }
      .scroll-box {
        overflow-y: auto;
        height: 90px;
        border: 1px solid #888;
      }
      .hidden-scroll-box {
        overflow: hidden;
        height: 36px;
        border: 1px solid #884;
      }
      .hidden-scroll-box .tall-content {
        height: 96px;
      }
      .quiet-scroll-box {
        overflow: auto;
        height: 120px;
        border: 1px solid #488;
      }
      button,
      input {
        display: block;
        margin-top: 12px;
      }
      .pseudo-label::before {
        content: "Generated label";
      }
      .opacity-zero {
        opacity: 0;
      }
      .content-hidden {
        content-visibility: hidden;
      }
      .zero-parent {
        position: relative;
        width: 0;
        height: 0;
      }
      .zero-parent button {
        position: absolute;
        left: 500px;
        top: 0;
        width: 140px;
        height: 32px;
      }
    </style>
  </head>
  <body>
    <header class="fixed-bar">App Bar</header>
    <main class="page">
      <section class="panel">
        <h1>Account Settings</h1>
        <label>
          Display Name
          <input name="displayName" value="Alice">
        </label>
        <button name="save">Save changes</button>
        <div class="scroll-box">
          <p>Scrollable row one</p>
          <p>Scrollable row two</p>
          <p>Scrollable row three</p>
          <p>Scrollable row four</p>
        </div>
        <div class="hidden-scroll-box">
          <div class="tall-content">Hidden overflow content</div>
        </div>
        <div class="quiet-scroll-box">
          <p>Quiet scroll content</p>
        </div>
      </section>
      <div class="pseudo-label"></div>
      <div class="opacity-zero"><button>Invisible action</button></div>
      <div class="content-hidden"><span>Hidden content</span></div>
      <div class="zero-parent"><button>Reparented action</button></div>
    </main>
    <script>window.fixtureLoaded = true;</script>
  </body>
</html>
